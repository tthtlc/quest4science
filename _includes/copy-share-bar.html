<div class="copy-share-bar" id="copy-share-bar">
  <button class="copy-share-btn" id="copy-page-btn" title="Copy page content" aria-label="Copy page content">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
    </svg>
    <span class="copy-share-label">Copy</span>
    <span class="copy-share-tooltip" id="copy-tooltip">Copied!</span>
  </button>

  <button class="copy-share-btn" id="share-page-btn" title="Share this page" aria-label="Share this page">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"></circle>
      <circle cx="6" cy="12" r="3"></circle>
      <circle cx="18" cy="19" r="3"></circle>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
    </svg>
    <span class="copy-share-label">Share</span>
  </button>

  <!-- Fallback share menu -->
  <div class="share-menu" id="share-menu">
    <a href="https://x.com/intent/tweet?text={{ page.title | default: site.title | url_encode }}%20{{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener" class="share-menu-item" aria-label="Share on X">
      <i class="fab fa-x-twitter"></i> X
    </a>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener" class="share-menu-item" aria-label="Share on Facebook">
      <i class="fab fa-facebook"></i> Facebook
    </a>
    <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener" class="share-menu-item" aria-label="Share on LinkedIn">
      <i class="fab fa-linkedin"></i> LinkedIn
    </a>
    <a href="https://bsky.app/intent/compose?text={{ page.title | default: site.title | url_encode }}%20{{ page.url | absolute_url | url_encode }}" target="_blank" rel="noopener" class="share-menu-item" aria-label="Share on Bluesky">
      <i class="fab fa-bluesky"></i> Bluesky
    </a>
  </div>
</div>

<style>
.copy-share-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  padding: 1.5rem 0;
  margin: 2rem 0 1rem;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  position: relative;
}

.copy-share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 1.2rem;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 8px;
  color: rgba(255, 255, 255, 0.85);
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.25s ease;
  position: relative;
  font-family: inherit;
}

.copy-share-btn:hover {
  background: rgba(102, 126, 234, 0.2);
  border-color: rgba(102, 126, 234, 0.4);
  color: #fff;
  box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
}

.copy-share-label {
  font-weight: 500;
}

.copy-share-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: #667eea;
  color: #fff;
  padding: 0.3rem 0.7rem;
  border-radius: 6px;
  font-size: 0.8rem;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
}

.copy-share-tooltip.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.share-menu {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  right: 50%;
  transform: translateX(50%);
  background: rgba(30, 30, 50, 0.95);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 12px;
  padding: 0.5rem;
  gap: 0.25rem;
  flex-direction: column;
  z-index: 100;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}

.share-menu.show {
  display: flex;
}

.share-menu-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 1rem;
  color: rgba(255, 255, 255, 0.85);
  text-decoration: none;
  border-radius: 8px;
  font-size: 0.85rem;
  transition: background 0.2s;
  white-space: nowrap;
}

.share-menu-item:hover {
  background: rgba(102, 126, 234, 0.3);
  color: #fff;
}
</style>

<script>
(function() {
  // Copy button
  var copyBtn = document.getElementById('copy-page-btn');
  var copyTooltip = document.getElementById('copy-tooltip');
  if (copyBtn) {
    copyBtn.addEventListener('click', function() {
      var content = document.querySelector('.page__content') || document.querySelector('article') || document.body;
      var text = content.innerText || content.textContent;
      navigator.clipboard.writeText(text).then(function() {
        copyTooltip.classList.add('show');
        setTimeout(function() { copyTooltip.classList.remove('show'); }, 2000);
      }).catch(function() {
        // Fallback for older browsers
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyTooltip.classList.add('show');
        setTimeout(function() { copyTooltip.classList.remove('show'); }, 2000);
      });
    });
  }

  // Share button
  var shareBtn = document.getElementById('share-page-btn');
  var shareMenu = document.getElementById('share-menu');
  if (shareBtn) {
    shareBtn.addEventListener('click', function() {
      if (navigator.share) {
        navigator.share({
          title: document.title,
          url: window.location.href
        }).catch(function() {});
      } else {
        shareMenu.classList.toggle('show');
      }
    });

    // Close share menu on outside click
    document.addEventListener('click', function(e) {
      if (!shareBtn.contains(e.target) && !shareMenu.contains(e.target)) {
        shareMenu.classList.remove('show');
      }
    });
  }
})();
</script>
